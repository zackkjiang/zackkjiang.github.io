    Experience:
      - company: New Jersey Institute of Technology
        position: PhD Research Engineer — Wearable Devices & Human-Machine Interfaces
        startDate: "2022"
        endDate: "present"
        summary: |
          - Built and deployed an end-to-end wearable biosignal system (EMG/ECG/SCG) integrating custom analog frontend, ESP32-based DAQ, and a real-time sensing pipeline for health monitoring.
          - Fabricated P(VDF-TrFE) piezoelectric nanofiber and triboelectric (TENG) flexible sensors from scratch; characterized sensitivity > 60 mV/kPa with 10,000-cycle durability via SEM, AFM, and impedance analysis.
          - Implemented a piezoelectric-sensing real-time muscle classification pipeline enabling low-latency control of robotic prosthetics.
          - Deployed a full sensor-to-VR system integrating flexible EMG sensors with a Unity-based virtual prosthetic hand for neuromotor rehabilitation; validated with amputees.
          - Collaborated across hardware, software, and clinical teams on 4 published systems; mentored 3 junior researchers.

      - company: Mississippi State University
        position: Graduate Research Engineer — Structural Sensing & Fault Diagnosis
        startDate: "2020"
        endDate: "2023"
        summary: |
          - Developed a multichannel ultrasonic sensing system for composite-material defect detection using ultrasonic C-Scan, achieving < 200 µm defect sensitivity through guided-wave signal processing.
          - Built a real-time bearing fault diagnosis pipeline fusing 6-channel vibration data via frequency-domain analysis, achieving > 98% accuracy.

