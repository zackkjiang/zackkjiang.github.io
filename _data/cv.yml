  summary: >
    PhD candidate in Mechanical Engineering at NJIT, also pursuing an OMSCS degree at Georgia Tech.
    My research builds wearable systems that bridge the human body and computational intelligence —
    engineering flexible piezoelectric, triboelectric, and strain sensors at the material level,
    processing biosignals (EMG/ECG/SCG), and designing AI-driven human-machine interfaces.
    Recent work appears in *Nano Energy*, *Advanced Sensor Research*, *Advanced Robotics Research*, and *ACS Materials Letters*.

